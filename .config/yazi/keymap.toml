# ~/.config/yazi/keymap.toml
# Yazi 26.x style: prepend only the shortcuts you want to override/add.

[mgr]
prepend_keymap = [
	# Edit/open the hovered file. Text files use nvim via yazi.toml.
	{ on = "e", run = "open --hovered", desc = "Edit/open hovered file" },

	# Lazygit. Press Ctrl-g to enter, press q inside lazygit to return to Yazi.
	{ on = "<C-g>", run = "shell --block -- lazygit", desc = "Open lazygit" },

	# Search matching lines in the current Yazi directory with rg + fzf.
	{ on = "<C-f>", run = "shell --block -- ~/.config/yazi/scripts/rg-fzf-open", desc = "Search file content via rg+fzf" },

	# FZF by file/directory name in the current Yazi directory.
	{ on = "<C-p>", run = "plugin fzf", desc = "Jump to file/directory via fzf" },

	# Quick shell in current directory.
	{ on = "<C-;>", run = "shell --interactive", desc = "Run shell command" },

	# Common high-efficiency actions.
	{ on = [ "g", "l" ], run = "cd ~/gitlab", desc = "Go ~/gitlab" },
	{ on = [ "g", "h" ], run = "cd ~/github", desc = "Go ~/github" },
	{ on = [ "g", "d" ], run = "cd ~/Downloads", desc = "Go ~/Downloads" },
	{ on = [ "g", "z" ], run = "cd ~/.zsh", desc = "Go ~/.zsh" },
	{ on = [ "g", "c" ], run = "cd ~/.config", desc = "Go ~/.config" },
	{ on = [ "g", "s" ], run = "cd ~/.raycast/scripts", desc = "Go ~/.raycast/scripts/" },
	{ on = [ "g", "n" ], run = "cd ~/.config/.nvim", desc = "Go ~/config/.nvim" },
	{ on = [ "g", "r" ], run = "cd /", desc = "Go filesystem root" },

	# Copy useful path variants.
	{ on = [ "c", "p" ], run = "copy path", desc = "Copy full path" },
	{ on = [ "c", "d" ], run = "copy dirname", desc = "Copy dirname" },
	{ on = [ "c", "f" ], run = "copy filename", desc = "Copy filename" },
	{ on = [ "c", "n" ], run = "copy name_without_ext", desc = "Copy name without extension" },

	# Sorting presets.
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "Sort by newest" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse=yes", "linemode size" ], desc = "Sort by largest" },
	{ on = [ ",", "n" ], run = [ "sort natural --reverse=no", "linemode none" ], desc = "Sort naturally" },

	# Show/hide dotfiles, and clear all transient state.
	{ on = ".", run = "hidden toggle", desc = "Toggle hidden files" },
	{ on = "<Esc>", run = "escape --all", desc = "Clear search/filter/selection" },
]
